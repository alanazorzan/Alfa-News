
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornal Informativo Escolar</title>
    <style>
        /* Estilos Gerais */
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #1a1a1a; /* Preto suave para leitura */
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Cabeçalho do Jornal */
        header {
            text-align: center;
            border-bottom: 4px double #0a2540; /* Azul Escuro */
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #0a2540; /* Azul Escuro */
        }

        header p {
            margin: 5px 0 0 0; 
            font-size: 1.2rem;
            color: #333333; /* Preto */
        }

        .sub-header {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #0a2540;
            padding: 6px 0;
            margin-top: 12px;
            font-style: italic;
            font-size: 0.9rem;
            color: #1a1a1a;
        }

        /* Layout em Grade (Notícias) */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Artigos e Notícias */
        article {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
            border-left: 5px solid #0a2540; /* Detalhe em Azul Escuro */
        }
